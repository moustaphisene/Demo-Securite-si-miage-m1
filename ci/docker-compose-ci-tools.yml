# =============================================================================
# Outils CI/CD — Jenkins (custom) + SonarQube + PostgreSQL
#
# Démarrage (1ère fois — build de l'image Jenkins) :
#   docker compose -f ci/docker-compose-ci-tools.yml up -d --build
#
# Démarrages suivants (image déjà buildée) :
#   docker compose -f ci/docker-compose-ci-tools.yml up -d
#
# Arrêt (conserve les données) :
#   docker compose -f ci/docker-compose-ci-tools.yml stop
#
# Nettoyage complet (supprime toutes les données) :
#   docker compose -f ci/docker-compose-ci-tools.yml down -v
#
# Accès :
#   Jenkins   → http://localhost:9090   admin / admin123
#   SonarQube → http://localhost:9000   admin / admin
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # Jenkins — image custom (version fixée + plugins + Trivy + Maven pré-installés)
  # ---------------------------------------------------------------------------
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: poc-keycloak-jenkins:2.462.3
    container_name: jenkins
    user: root
    ports:
      - "9090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # Accès Docker depuis Jenkins
      - maven_cache:/root/.m2                        # Cache Maven inter-builds
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks: [ci-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ---------------------------------------------------------------------------
  # SonarQube Community Edition 10.5
  # ---------------------------------------------------------------------------
  sonarqube:
    image: sonarqube:10.5-community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
      - sonar_logs:/opt/sonarqube/logs
    depends_on:
      sonar-db:
        condition: service_healthy
    networks: [ci-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — base de données SonarQube
  # ---------------------------------------------------------------------------
  sonar-db:
    image: postgres:16-alpine
    container_name: sonar-db
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonar_pgdata:/var/lib/postgresql/data
    networks: [ci-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 5s
      timeout: 5s
      retries: 10

# =============================================================================
# Réseaux & Volumes
# =============================================================================
networks:
  ci-net:
    driver: bridge

volumes:
  jenkins_home:
  maven_cache:       # Cache .m2 partagé entre tous les builds
  sonar_data:
  sonar_extensions:
  sonar_logs:
  sonar_pgdata: